services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sena_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-biblioteca_db}
    volumes:
      - postgres_data_v3:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sena_user} -d ${POSTGRES_DB:-biblioteca_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - coolify

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-sena_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-biblioteca_db}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - MAIL_SERVER=${MAIL_SERVER}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USE_TLS=${MAIL_USE_TLS}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER}
    expose:
      - "5000"
    volumes:
      - uploads_data:/app/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - coolify
    command: >
      sh -c "flask --app run init-db &&
             gunicorn --bind 0.0.0.0:5000 --workers 2 run:app"

  frontend:
    build:
      context: ./app/static
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - coolify

volumes:
  postgres_data_v3:
  uploads_data:

networks:
  coolify:
    external: true
